<!DOCTYPE html>
<html>
<head>
    <title>AI Prompt App</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            background: white;
            padding: 20px;
            border-right: 2px solid #ddd;
        }

        .sidebar h3 {
            margin-top: 0;
        }

        .sidebar a {
            display: block;
            margin: 10px 0;
            text-decoration: none;
            color: #007bff;
        }

        /* Main Content */
        .main {
            flex: 1;
            padding: 40px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 700px;
            margin: auto;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            resize: none;
        }

        select {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            border-radius: 8px;
            border: none;
            background-color: #007bff;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

    </style>
</head>
<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h3>+ New Prompt</h3>
        <a href="#">Prompt 1</a>
        <a href="#">Prompt 2</a>
        <a href="#">....</a>
        <hr>
        <form method="post" action="{% url 'logout' %}">
    {% csrf_token %}
    <button type="submit" style="background:none; border:none; color:#007bff; padding:0; cursor:pointer;">Logout</button>
</form>
    </div>

    <!-- Main Content -->
    <div class="main">
        <div class="card">
            <h2>Enter Your Prompt</h2>

           <form method="post" action="{% url 'home' %}">
                {% csrf_token %}
                <textarea name="prompt" placeholder="Type your prompt here..."></textarea>

                <label style="margin-top:15px; display:block;">
                    Select task type
                </label>

                <select name="task_type">
                    <option value="summarize">Summarize</option>
                    <option value="rewrite">Rewrite</option>
                    <option value="explain">Explain</option>
                    <option value="generate">Generate</option>
                    <option value="analyze">Analyze</option>
                </select>

                <button type="submit">Submit</button>
                {% if response %}
<div style="margin-top:20px; padding:15px; background:#f0f8ff; border-radius:8px;">
    <strong>Response:</strong>
    <p>{{ response }}</p>
</div>
{% endif %}
            </form>
        </div>
    </div>

</div>

</body>
</html>
